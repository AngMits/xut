variables:
  - &void_image 'ghcr.io/void-linux/void-glibc-busybox:latest'

when:
  - branch: master
    event: [ push, manual, cron ]

steps:
  "Install shellspec, pull xut and run tests":
    image: *void_image
    commands:
      - wget https://github.com/shellspec/shellspec/archive/0.28.1.tar.gz
      - tar xzvf 0.28.1.tar.gz
      - ln -s /shellspec-0.28.1/shellspec /usr/local/bin
      - shellspec
