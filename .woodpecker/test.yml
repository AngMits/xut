variables:
  - &void_image 'ghcr.io/void-linux/void-glibc-full:latest'

when:
  - branch: master
    event: [ push, manual, cron ]

steps:
  "Install shellspec, pull xut and run tests":
    image: *void_image
    commands:
      - xbps-install -S
      - xbps-install -uy xbps
      - xbps-install -y wget make git
      - make install
      - wget https://github.com/shellspec/shellspec/archive/0.28.1.tar.gz
      - tar xzf 0.28.1.tar.gz
      - ln -s "$(pwd)/shellspec-0.28.1/shellspec" /usr/local/bin/shellspec
      - ls -la
      - echo "Creating new user 'tester'..."
      # Create the user with a home directory
      - useradd -m tester
      - echo "tester:password123" > /tmp/user_password.txt
      - chpasswd < /tmp/user_password.txt
      - rm /tmp/user_password.txt # Clean up password file
      - echo "User 'tester' created successfully."
      - usermod --shell /bin/sh tester
      - su -c 'whoami' tester
      - id
      - pwd
      # Run test as root
      - shellspec $(pwd)/spec/xut_root_spec.sh --color --format documentation
      # Ownership change to tester for the current directory
      - chown -R tester:tester .
      - mkdir -p /tmp/xut_tmp
      - chown -R tester:tester /tmp/xut_tmp
      # Run tests as user
      - |
        su tester -c "
          export SHELLSPEC_TMPDIR=$(pwd)/.shellspec-tmp
          mkdir -p \$SHELLSPEC_TMPDIR
          shellspec $(pwd)/spec/xut_spec.sh --color --format documentation
        "
      - |
        su tester -c "
          export SHELLSPEC_TMPDIR=$(pwd)/.shellspec-tmp
          mkdir -p \$SHELLSPEC_TMPDIR
          shellspec $(pwd)/spec/xut_script_spec.sh --color --format documentation
        "
